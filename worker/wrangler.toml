name = "ss-onboarding-api"
main = "src/index.js"
compatibility_date = "2026-06-01"
account_id = "1abe294524503c88d22016d52c424675"
workers_dev = false

# Same-origin API: intercept /api/* on the form's hostname (Pages serves the rest).
routes = [
  { pattern = "onboarding.sprintsandsneakers.dev/api/*", zone_name = "sprintsandsneakers.dev" }
]

[vars]
# Onboarding root: a token (= a Drive folder id) is only accepted if the folder lives
# under this folder. This whitelists partner project folders without a registry.
ROOT_FOLDER_ID = "11ncxYJfj7JL_8b3GX1vrBYfUt6FUo9uU"
# Where files go when the token resolves to nothing valid (safety net; never lost).
FALLBACK_FOLDER_ID = "11ncxYJfj7JL_8b3GX1vrBYfUt6FUo9uU"

# Secret (set via: wrangler secret put GOOGLE_SA_KEY):
#   GOOGLE_SA_KEY = full service-account JSON key
